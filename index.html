<!DOCTYPE html>
<html>
<head>
<title>LifeSimm</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

.card{
    background:#1e1e1e;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    display:none;
}

button{
    padding:12px 20px;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🌎 LifeSimm</h1>

<div id="startScreen">
    <p>Welcome to your life.</p>
    <button onclick="startGame()">▶ Start Life</button>
</div>

<div class="card" id="game">

    <h2>👤 Player</h2>

    <p>Age: <span id="age">0</span></p>
    <p>Money: $<span id="money">0</span></p>
    <p>Health: <span id="health">100</span>%</p>

    <h3>Choose Career</h3>

    <button onclick="chooseCareer('boxer')">🥊 Boxer</button>
    <button onclick="chooseCareer('student')">🎓 Student</button>
    <button onclick="chooseCareer('worker')">💼 Worker</button>
    <button onclick="chooseCareer('criminal')">⚠️ Risky Path</button>

    <h3>Life Choices</h3>

    <button onclick="goToSchool()">📚 Study</button>
    <button onclick="workHard()">💼 Work Hard</button>
    <button onclick="rest()">😴 Rest</button>
    <button onclick="takeRisk()">🎲 Take Risk</button>

    <br><br>

    <button onclick="nextYear()">⏭ Next Year</button>

</div>

<script>

let age = 0;
let money = 0;
let health = 100;
let career = "none";

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
}

function chooseCareer(type){
    career = type;
    alert("Career chosen: " + type);
}

function nextYear(){

    age++;

    money += Math.floor(Math.random() * 2000);

    if(career === "boxer"){
        money += 1000;
        health += 2;
    }
    else if(career === "student"){
        money += 300;
    }
    else if(career === "worker"){
        money += 800;
    }
    else if(career === "criminal"){
        money += 2000;
        health -= 5;
    }

    let eventRoll = Math.random();

    if(eventRoll < 0.25){
        money += 500;
        alert("💼 Job opportunity!");
    }
    else if(eventRoll < 0.45){
        health -= 10;
        alert("🤒 You got sick!");
    }
    else if(eventRoll < 0.60){
        money += 2000;
        alert("🎉 Lottery win!");
    }
    else if(eventRoll < 0.75){
        money -= 1000;
        alert("💸 Unexpected expense!");
    }
    else if(eventRoll < 0.85){
        health += 5;
        alert("🏋️ Training paid off!");
    }

    if(health > 100) health = 100;
    if(health < 0) health = 0;
    if(money < 0) money = 0;

    document.getElementById("age").innerText = age;
    document.getElementById("money").innerText = money;
    document.getElementById("health").innerText = health;
}

function goToSchool(){
    money -= 200;
    health += 2;
    alert("📚 You studied.");
}

function workHard(){
    money += 500;
    health -= 3;
    alert("💼 You worked hard.");
}

function rest(){
    health += 5;
    alert("😴 You rested.");
}

function takeRisk(){
    if(Math.random() < 0.5){
        money += 2000;
        alert("🎲 Big win!");
    } else {
        money -= 1000;
        health -= 5;
        alert("🎲 Risk failed...");
    }
}

</script>

</body>
</html>
